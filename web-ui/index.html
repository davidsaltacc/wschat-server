<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSChat</title>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="favicon.ico" />
</head>
<body>
    
    <div id="login-overlay" class="max-size centering">
        <div class="overlay-box" id="login-overlay-box">
            <p class="no-margin-top">WSChat Server URL</p>
            <input id="server-url-input" title="WSChat Server URL" type="url" />
            <p>Password</p>
            <input id="password-input" title="Password" type="password">
            <p id="login-status-text"></p>
            <button id="login-button">Login</button>
            <div class="flex-row" id="remember-login-container">
                <input id="remember-login" title="Remember" type="checkbox" />
                <p>Remember login info</p>
            </div>
        </div>
    </div>
    
    <div id="chats-overlay" class="max-size flex-col">
        <div class="flex-row row-center-space-between">
            <h2 id="chats-title">Chats</h2>
            <button id="logout-button">Logout</button>
        </div>
        <hr class="no-margin no-padding" />
        <h3 id="loading-chats-text">Loading chats...</h3>
        <div id="chats-container" class="no-margin no-padding">
            <div id="basechat" class="list-chat">
                <div class="flex-row list-chat-container">
                    <div class="list-chat-left">
                        <p id="basechat-platform" class="list-chat-platform"></p>
                        <p id="basechat-name" class="list-chat-name"></p>
                    </div>
                    <div class="flex-row list-chat-right">
                        <p id="basechat-last-content" class="list-chat-last-content"></p>
                        <div class="flex-col list-chat-right-right">
                            <p id="basechat-last-author" class="list-chat-last-author"></p>
                            <p id="basechat-last-date-nice" class="list-chat-last-date-nice"></p>
                            <div id="basechat-last-date" class="hidden"></div>
                        </div>
                    </div>
                </div>
                <hr class="no-margin list-chat-seperator" />
            </div>
        </div>
    </div>
    
    <div id="person-overlay" class="hides-personoverlay max-size centering">
        <div class="overlay-box" id="person-overlay-container">
            <p class="no-margin-top" id="personoverlay-name"></p>
            <p class="no-margin-top" id="personoverlay-ids"><span id="personoverlay-uname"></span> (<span id="personoverlay-id"></span>)</p>
            <p class="no-margin-top" id="personoverlay-bio"></p>
            <p class="no-margin-top no-margin-bottom" id="personoverlay-date-text">Account exists since: <span id="personoverlay-date"></span></p>
        </div>
        <button class="hides-personoverlay" id="hide-person-overlay">Close</button>
    </div>
    
    <div class="max-size flex-col" id="chat-messages-container">
        <div class="flex-row" id="chat-messages-header">
            <h2 id="openchat-name"></h2>
            <p id="openchat-platform"></p>
            <div id="chat-messages-header-seperator"></div>
            <button id="close-chat-button">Close Chat</button>
        </div>
        <hr class="no-margin no-padding" />
        <div id="messages-container" class="no-margin no-padding">
            <div id="basemessage" class="hidden">
                <div class="flex-col chat-message-container">
                    <div class="flex-row row-center-space-between chat-message-firstrow">
                        <p id="basemessage-author" class="chat-message-author"></p>
                        <div class="flex-row chat-message-date-buttons">
                            <p id="basemessage-button-delete" class="chat-message-button">[delete]</p>
                            <p id="basemessage-button-edit" class="chat-message-button">[edit]</p>
                            <p id="basemessage-date-nice" class="chat-message-date"></p>
                        </div>
                        <div id="basemessage-date" class="hidden"></div>
                    </div>
                    <p id="basemessage-content" class="chat-message-content"></p>
                    <div class="flex-row chat-message-edit-container" id="basemessage-edit-container">
                        <textarea title="Edit Message" id="basemessage-edit-box" class="chat-message-edit-box" spellcheck="false"></textarea>
                        <div class="flex-col">
                            <button id="basemessage-cancel-edited-button" class="chat-message-edit-button">Cancel</button>
                            <button id="basemessage-save-edited-button" class="chat-message-edit-button">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <hr class="no-margin no-padding" id="chat-send-seperator" />
            <div class="flex-row row-center-space-between">
                <textarea id="sendmessage-content" placeholder="Send Texts" spellcheck="false"></textarea>
                <button id="sendmessage-button">Send</button>
            </div>
        </div>
    </div>

</body>
</html>
