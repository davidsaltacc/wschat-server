<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSChat</title>
    <script src="./index.js" defer></script>
</head>
<!-- so i was too lazy to make a seperate css file and ended up with this mess -->
<body style="background-color: #131313; font-family: 'Courier New', Courier, monospace;">

    <div id="login-overlay" style="z-index: 99; background-color: #131313; border: 0; margin: 0; padding: 0; position: fixed; left: 0; top: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;">
        <div style="padding: 40px; border: 2px solid #ffffff4f; border-radius: 20px; display: flex; flex-direction: column;">
            <p style="color: #ffffff; text-align: center; margin-top: 0;">WSChat Server URL</p>
            <input id="server-url-input" style="font-family: 'Courier New', Courier, monospace; color: #ffffff; background-color: #222222; border: 1px solid #ffffff4f; border-radius: 4px;" title="WSChat Server URL" type="url" />
            <p style="color: #ffffff; text-align: center;">Password</p>
            <input id="password-input" style="font-family: 'Courier New', Courier, monospace; color: #ffffff; background-color: #222222; border: 1px solid #ffffff4f; border-radius: 4px;" title="Password" type="password">
            <p id="login-status-text" style="color: #db4949; text-align: center;"></p>
            <button id="login-button" style="font-family: 'Courier New', Courier, monospace; color: #ffffff; background-color: #222222; border: 1px solid #ffffff4f; border-radius: 4px; padding: 5px; margin-top: 50px; cursor: pointer;">Login</button>
            <div style="display: flex; flex-direction: row; justify-content: center;">
                <input id="remember-login" title="Remember" type="checkbox" style="accent-color: #333333; width: 20px; margin-right: 10px; filter: invert();" />
                <p style="color: #ffffff; text-align: center;">Remember login info</p>
            </div>
        </div>
    </div>

    <div style="z-index: 5; border: 0; margin: 0; padding: 0; position: fixed; left: 0; top: 0; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: auto;">
        <h2 style="color: #ffffff; margin: 20px; margin-bottom: 15px;">Chats</h2>
        <hr style="margin: 0; padding: 0;" />
        <div id="basechat" style="padding-top: 10px; display: none; cursor: pointer;">
            <div style="display: flex; flex-direction: row; justify-content: space-between; align-items: center;">
                <div style="flex-shrink: 0; margin-right: 15px; margin-left: 10px;">
                    <p id="basechat-platform" style="margin: 0; color: #ffffff; font-size: 0.8rem;"></p>
                    <p id="basechat-name" style="margin: 0; color: #ffffff; font-size: 1.031rem;"></p>
                </div>
                <div style="display: flex; flex-direction: row; align-items: center; min-width: 0;">
                    <p id="basechat-last-content" style="margin: 0; color: #dfdfdf; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; "></p>
                    <div style="display: flex; flex-direction: column; align-items: end; margin-left: 15px; margin-right: 10px; flex-shrink: 0;">
                        <p id="basechat-last-author" style="margin: 0; color: #838383;"></p>
                        <p id="basechat-last-date-nice" style="margin: 0; color: #838383; font-size: 0.8rem;"></p>
                        <div id="basechat-last-date" style="display: none;"></div>
                    </div>
                </div>
            </div>
            <hr style="margin: 0; margin-top: 10px;" />
        </div>
        <h3 style="color: #ffffff; margin: 15px;" id="loading-chats-text">Loading chats...</h3>
    </div>

</body>
</html>
